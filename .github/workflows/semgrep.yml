# Static security analysis: runs Semgrep on push/PR to main.
# `--error` makes the job fail (non-zero exit) when findings exist, so
# security/supply-chain issues block the build instead of being advisory.
name: Semgrep

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run Semgrep
        run: semgrep scan --config auto --error
