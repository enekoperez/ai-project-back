name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "37 6 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4        # ← v4, no v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3   # ← v3, no v4
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3  # ← añade este paso

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3   # ← v3, no v4
        with:
          category: "/language:python"