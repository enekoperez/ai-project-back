# Docker build verification: builds the image on push/PR to main and runs
# a smoke test (import webapp.run) to confirm the container boots and the
# app imports cleanly. Does not push the image anywhere.
name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build Docker image
        run: docker build . --file Dockerfile --tag ai-project-back:test

      - name: Smoke test Docker image imports
        run: |
          docker run --rm --env-file .env.example ai-project-back:test \
            python -c "import webapp.run; print('Application imports successfully')"
