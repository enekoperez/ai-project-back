name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build . --file Dockerfile --tag ai-project:test

      - name: Smoke test Docker image imports
        run: |
          docker run --rm --env-file .env.example ai-project:test \
            python -c "import webapp.run; print('Application imports successfully')"
