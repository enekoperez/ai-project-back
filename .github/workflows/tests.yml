name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check installed dependencies
        run: pip check

      - name: Run Ruff
        run: |
          pip install ruff
          ruff check --output-format=github webapp tests

      - name: Run tests
        run: pytest tests/ --color=yes --cov=webapp --cov-report=term-missing --cov-fail-under=80
