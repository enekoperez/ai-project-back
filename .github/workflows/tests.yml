name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Check installed dependencies
        run: pip check

      - name: Run Ruff
        run: ruff check --output-format=github webapp tests

      - name: Run tests
        run: pytest tests/ --color=yes --cov=webapp --cov-report=term-missing --cov-fail-under=80
